<?xml version="1.0" encoding="UTF-8"?>
<!-- BolSaaf feature graphic: 1024x500, no alpha. Render with rsvg-convert / inkscape / cairosvg. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Brand gradient: red → purple → blue (matches the in-app theme) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#E94E5B"/>
      <stop offset="0.5" stop-color="#A24CB7"/>
      <stop offset="1"   stop-color="#3D7DDB"/>
    </linearGradient>
    <!-- Soft highlight overlay -->
    <radialGradient id="glow" cx="25%" cy="35%" r="60%">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft vignette in the top-right for Install button contrast -->
    <radialGradient id="rightshade" cx="100%" cy="0%" r="75%">
      <stop offset="0"   stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Waveform gradient (matches the brand stops but lighter) -->
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Subtle app icon tile gradient -->
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed brand background -->
  <rect width="1024" height="500" fill="url(#brand)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>
  <rect width="1024" height="500" fill="url(#rightshade)"/>

  <!-- Left-hand wordmark + tagline (kept inside 0..640 safe zone) -->
  <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" fill="#FFFFFF">
    <!-- Micro-mark next to the wordmark -->
    <g transform="translate(56 120)">
      <rect width="64" height="64" rx="16" fill="url(#chip)" stroke="#FFFFFF" stroke-opacity="0.28"/>
      <!-- stylised "voice mark" — two concentric arcs + dot -->
      <circle cx="32" cy="32" r="6"  fill="#FFFFFF"/>
      <path d="M32 13 a19 19 0 0 1 0 38" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
      <path d="M32 20 a12 12 0 0 1 0 24" fill="none" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="140" y="175" font-size="84" font-weight="800" letter-spacing="-1">BolSaaf</text>
    <text x="58"  y="245" font-size="26" font-weight="500" fill="#FFFFFF" fill-opacity="0.92">
      Studio-grade voice. Right from your phone.
    </text>
    <text x="58"  y="285" font-size="18" font-weight="400" fill="#FFFFFF" fill-opacity="0.78">
      Clean audio · Make reels · Add vibe · One tap
    </text>

    <!-- Feature chips -->
    <g font-size="15" font-weight="600">
      <g transform="translate(58 340)">
        <rect width="144" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.3"/>
        <text x="72" y="23" text-anchor="middle" fill="#FFFFFF">Noise removal</text>
      </g>
      <g transform="translate(212 340)">
        <rect width="120" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.3"/>
        <text x="60" y="23" text-anchor="middle" fill="#FFFFFF">Reel engine</text>
      </g>
      <g transform="translate(342 340)">
        <rect width="144" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.16" stroke="#FFFFFF" stroke-opacity="0.3"/>
        <text x="72" y="23" text-anchor="middle" fill="#FFFFFF">Video cleaner</text>
      </g>
    </g>
  </g>

  <!-- Right-hand waveform illustration (center of right half, leaves corner for Install overlay) -->
  <g transform="translate(620 250)" fill="url(#wave)">
    <!--
      Bar chart 38 bars, each 8 wide, 4 gap → ~438 px wide, centered around x=0.
      Heights follow a soft voice-like envelope so it reads as a waveform, not noise.
    -->
    <rect x="-216" y="-22" width="8" height="44" rx="2"/>
    <rect x="-204" y="-32" width="8" height="64" rx="2"/>
    <rect x="-192" y="-48" width="8" height="96" rx="2"/>
    <rect x="-180" y="-70" width="8" height="140" rx="2"/>
    <rect x="-168" y="-58" width="8" height="116" rx="2"/>
    <rect x="-156" y="-40" width="8" height="80" rx="2"/>
    <rect x="-144" y="-60" width="8" height="120" rx="2"/>
    <rect x="-132" y="-80" width="8" height="160" rx="2"/>
    <rect x="-120" y="-96" width="8" height="192" rx="2"/>
    <rect x="-108" y="-76" width="8" height="152" rx="2"/>
    <rect x="-96"  y="-50" width="8" height="100" rx="2"/>
    <rect x="-84"  y="-64" width="8" height="128" rx="2"/>
    <rect x="-72"  y="-88" width="8" height="176" rx="2"/>
    <rect x="-60"  y="-112" width="8" height="224" rx="2"/>
    <rect x="-48"  y="-90" width="8" height="180" rx="2"/>
    <rect x="-36"  y="-72" width="8" height="144" rx="2"/>
    <rect x="-24"  y="-108" width="8" height="216" rx="2"/>
    <rect x="-12"  y="-128" width="8" height="256" rx="2"/>
    <rect x="0"    y="-132" width="8" height="264" rx="2"/>
    <rect x="12"   y="-120" width="8" height="240" rx="2"/>
    <rect x="24"   y="-94"  width="8" height="188" rx="2"/>
    <rect x="36"   y="-70"  width="8" height="140" rx="2"/>
    <rect x="48"   y="-88"  width="8" height="176" rx="2"/>
    <rect x="60"   y="-62"  width="8" height="124" rx="2"/>
    <rect x="72"   y="-46"  width="8" height="92"  rx="2"/>
    <rect x="84"   y="-68"  width="8" height="136" rx="2"/>
    <rect x="96"   y="-40"  width="8" height="80"  rx="2"/>
    <rect x="108"  y="-56"  width="8" height="112" rx="2"/>
    <rect x="120"  y="-30"  width="8" height="60"  rx="2"/>
    <rect x="132"  y="-44"  width="8" height="88"  rx="2"/>
    <rect x="144"  y="-22"  width="8" height="44"  rx="2"/>
    <rect x="156"  y="-36"  width="8" height="72"  rx="2"/>
    <rect x="168"  y="-20"  width="8" height="40"  rx="2"/>
    <rect x="180"  y="-28"  width="8" height="56"  rx="2"/>
    <rect x="192"  y="-16"  width="8" height="32"  rx="2"/>
  </g>

  <!-- Bottom-left subtle version / site -->
  <text x="58" y="456" font-family="-apple-system, Roboto, sans-serif"
        font-size="14" fill="#FFFFFF" fill-opacity="0.7" font-weight="500">
    shadowselfwork.com/voice
  </text>
</svg>
