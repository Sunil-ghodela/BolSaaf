name: bolsaaf-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  android-python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1

      - name: Run Android unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Run adaptive benchmark scripts
        run: |
          python3 scripts/generate_test_signals.py
          python3 scripts/benchmark_batch_analyze.py

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-adaptive-batch
          path: data/benchmark_adaptive_batch.json
